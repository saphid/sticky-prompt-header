<svg width="980" height="560" viewBox="0 0 980 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mock screenshot of Sticky Prompt Header in Pi</title>
  <desc id="desc">A terminal window with a sticky latest prompt banner pinned across the top.</desc>
  <defs>
    <linearGradient id="window" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#132238"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, &quot;Liberation Mono&quot;, &quot;Courier New&quot;, monospace; }
      .dim { fill: #64748b; }
      .muted { fill: #94a3b8; }
      .text { fill: #dbeafe; }
      .accent { fill: #38bdf8; font-weight: 700; }
      .green { fill: #34d399; }
      .yellow { fill: #fbbf24; }
      .red { fill: #fb7185; }
      .border { stroke: #38bdf8; }
    </style>
  </defs>

  <rect width="980" height="560" rx="26" fill="#0f172a"/>
  <rect x="28" y="28" width="924" height="504" rx="18" fill="url(#window)" filter="url(#shadow)"/>

  <!-- title bar -->
  <rect x="28" y="28" width="924" height="42" rx="18" fill="#111827"/>
  <rect x="28" y="52" width="924" height="18" fill="#111827"/>
  <circle cx="54" cy="49" r="7" fill="#fb7185"/>
  <circle cx="76" cy="49" r="7" fill="#fbbf24"/>
  <circle cx="98" cy="49" r="7" fill="#34d399"/>
  <text x="490" y="54" text-anchor="middle" class="mono muted" font-size="14">pi — sticky prompt header</text>

  <!-- sticky overlay banner -->
  <rect x="52" y="88" width="876" height="112" rx="14" fill="url(#banner)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="76" y="121" class="mono accent" font-size="18">╭ Latest prompt ↟ ───────────────────────────────────────────────────────────────────────╮</text>
  <text x="76" y="151" class="mono text" font-size="18">│ Make the sticky prompt header feel nicer, with wrapping and a polished terminal frame │</text>
  <text x="76" y="181" class="mono text" font-size="18">│ around the latest user prompt while keeping the editor focused.                       │</text>

  <!-- conversation behind it -->
  <text x="58" y="236" class="mono dim" font-size="15">pi v0.70.5 · Ctrl+C interrupt · / commands · ! bash · Ctrl+T more</text>
  <text x="58" y="276" class="mono muted" font-size="16">User</text>
  <text x="108" y="276" class="mono text" font-size="16">Can we make the prompt stay visible when the conversation scrolls?</text>
  <text x="58" y="318" class="mono accent" font-size="16">Assistant</text>
  <text x="150" y="318" class="mono text" font-size="16">Yes — this extension pins the latest submitted prompt as a non-capturing overlay.</text>
  <text x="150" y="348" class="mono text" font-size="16">It stays at the top without stealing focus from the input editor.</text>

  <!-- tool/status rows -->
  <rect x="52" y="386" width="876" height="34" rx="8" fill="#0b1220" stroke="#1f2937"/>
  <text x="70" y="408" class="mono green" font-size="15">✓</text>
  <text x="96" y="408" class="mono muted" font-size="15">sticky-prompt-header loaded</text>
  <text x="730" y="408" class="mono dim" font-size="15">nonCapturing: true</text>

  <!-- editor -->
  <rect x="52" y="448" width="876" height="58" rx="12" fill="#020617" stroke="#334155"/>
  <text x="72" y="484" class="mono muted" font-size="17">›</text>
  <text x="98" y="484" class="mono text" font-size="17">Ask Pi anything…</text>
  <rect x="236" y="466" width="10" height="24" rx="2" fill="#38bdf8" opacity="0.9"/>
</svg>
