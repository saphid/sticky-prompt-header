<svg width="1000" height="520" viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sticky Prompt Header mock screenshot</title>
  <desc id="desc">A clean terminal mockup showing a Pi sticky prompt banner at the top of the screen.</desc>

  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .mono { font-family: Menlo, Monaco, Consolas, &quot;Liberation Mono&quot;, monospace; }
      .text { fill: #d6deeb; }
      .muted { fill: #7f8ea3; }
      .dim { fill: #526174; }
      .accent { fill: #5cc8ff; font-weight: 700; }
      .green { fill: #7ee787; }
      .border { stroke: #2e9cca; }
    </style>
  </defs>

  <rect width="1000" height="520" fill="#0b1020"/>

  <g filter="url(#shadow)">
    <rect x="46" y="38" width="908" height="444" rx="14" fill="#060b14" stroke="#1f2a3a"/>
    <rect x="46" y="38" width="908" height="36" rx="14" fill="#111827"/>
    <rect x="46" y="58" width="908" height="16" fill="#111827"/>
  </g>

  <circle cx="68" cy="57" r="5.5" fill="#ff5f57"/>
  <circle cx="87" cy="57" r="5.5" fill="#ffbd2e"/>
  <circle cx="106" cy="57" r="5.5" fill="#28c840"/>
  <text x="500" y="62" text-anchor="middle" class="mono muted" font-size="13">pi</text>

  <!-- sticky overlay -->
  <rect x="68" y="94" width="864" height="98" rx="8" fill="#0b1828" stroke="#2e9cca"/>
  <text x="84" y="122" class="mono accent" font-size="16">╭ Latest prompt ↟ ─────────────────────────────────────────────────────────────╮</text>
  <text x="84" y="150" class="mono text" font-size="16">│ Need to add more nice UI around the prompt, but keep it clean and readable. │</text>
  <text x="84" y="178" class="mono accent" font-size="16">╰──────────────────────────────────────────────────────────────────────────────╯</text>

  <!-- pi transcript beneath -->
  <text x="68" y="226" class="mono dim" font-size="14">pi v0.70.5 · Ctrl+C interrupt · / commands · ! bash</text>

  <text x="68" y="268" class="mono muted" font-size="15">user</text>
  <text x="122" y="268" class="mono text" font-size="15">Can you keep my last prompt visible when the chat scrolls?</text>

  <text x="68" y="310" class="mono accent" font-size="15">assistant</text>
  <text x="160" y="310" class="mono text" font-size="15">Yes — the extension pins it as a non-capturing overlay.</text>
  <text x="160" y="336" class="mono text" font-size="15">The editor keeps focus, and the conversation scrolls underneath.</text>

  <rect x="68" y="366" width="864" height="34" rx="6" fill="#0a1220" stroke="#1d2a3a"/>
  <text x="84" y="388" class="mono green" font-size="14">✓</text>
  <text x="108" y="388" class="mono muted" font-size="14">sticky-prompt-header.ts loaded</text>

  <!-- editor -->
  <rect x="68" y="426" width="864" height="38" rx="8" fill="#030712" stroke="#243244"/>
  <text x="86" y="450" class="mono accent" font-size="16">›</text>
  <text x="112" y="450" class="mono muted" font-size="16">Ask Pi anything…</text>
  <rect x="270" y="434" width="8" height="22" rx="2" fill="#5cc8ff" opacity="0.85"/>
</svg>
